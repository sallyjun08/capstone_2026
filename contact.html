<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제휴 문의 | Lotto Generator</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .form-card { max-width: 480px; width: 100%; }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: var(--subtitle);
            text-decoration: none;
            margin-bottom: 20px;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--text); }

        h1.form-title {
            font-size: 1.7rem;
            margin-bottom: 6px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 16px;
            text-align: left;
        }

        label {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--subtitle);
            letter-spacing: 0.3px;
        }

        input, select, textarea {
            padding: 11px 14px;
            font-size: 0.95rem;
            border-radius: 12px;
            border: 1.5px solid var(--border);
            background: rgba(255,255,255,0.5);
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.3s;
            font-family: inherit;
            width: 100%;
        }
        body.dark input,
        body.dark select,
        body.dark textarea {
            background: rgba(255,255,255,0.06);
        }

        input:focus, select:focus, textarea:focus {
            border-color: #ba68c8;
            box-shadow: 0 0 0 3px rgba(186,104,200,0.18);
        }

        textarea {
            resize: vertical;
            min-height: 110px;
        }

        .optional {
            font-weight: 400;
            font-size: 0.75rem;
            color: #bbb;
            margin-left: 4px;
        }

        #submit-btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #f06292, #ba68c8);
            color: #fff;
            border: none;
            border-radius: 50px;
            box-shadow: 0 6px 22px var(--btn-shadow);
            transition: transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.18s, opacity 0.2s;
            margin-top: 6px;
            letter-spacing: 0.3px;
        }
        #submit-btn:hover:not(:disabled) {
            transform: scale(1.03) translateY(-2px);
            box-shadow: 0 12px 30px var(--btn-shadow);
        }
        #submit-btn:active:not(:disabled) { transform: scale(0.97); }
        #submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        /* success / error state */
        .result-msg {
            display: none;
            text-align: center;
            padding: 28px 16px;
        }
        .result-msg.show { display: block; }
        .result-msg .icon { font-size: 3rem; margin-bottom: 12px; }
        .result-msg h2 { font-size: 1.3rem; margin-bottom: 8px; color: var(--text); }
        .result-msg p  { font-size: 0.9rem; color: var(--subtitle); }
        .result-msg .home-link {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 28px;
            background: linear-gradient(135deg, #f06292, #ba68c8);
            color: #fff;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .error-msg {
            font-size: 0.82rem;
            color: #e63946;
            margin-top: 10px;
            display: none;
        }
        .error-msg.show { display: block; }
    </style>
</head>
<body>
    <button id="theme-toggle">🌙</button>

    <div class="container form-card">
        <!-- Form view -->
        <div id="form-view">
            <a href="index.html" class="back-link">← 홈으로</a>
            <div class="deco" aria-hidden="true">
                <span>🤝</span><span>✨</span><span>💼</span><span>✨</span><span>🌟</span>
            </div>
            <h1 class="form-title">제휴 문의</h1>
            <p class="subtitle" style="margin-bottom:28px;">함께 성장할 파트너를 기다립니다 🌱</p>

            <form id="contact-form" action="https://formspree.io/f/xvzdzjez" method="POST">
                <div class="form-group">
                    <label for="company">회사명</label>
                    <input type="text" id="company" name="company" placeholder="(주)회사이름" required>
                </div>
                <div class="form-group">
                    <label for="name">담당자 이름</label>
                    <input type="text" id="name" name="name" placeholder="홍길동" required>
                </div>
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" placeholder="example@company.com" required>
                </div>
                <div class="form-group">
                    <label for="phone">연락처 <span class="optional">선택</span></label>
                    <input type="tel" id="phone" name="phone" placeholder="010-0000-0000">
                </div>
                <div class="form-group">
                    <label for="type">문의 유형</label>
                    <select id="type" name="inquiry_type" required>
                        <option value="" disabled selected>선택해주세요</option>
                        <option value="광고 제휴">광고 제휴</option>
                        <option value="콘텐츠 제휴">콘텐츠 제휴</option>
                        <option value="기술 협력">기술 협력</option>
                        <option value="기타">기타</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" placeholder="제휴 관련 내용을 자유롭게 작성해주세요." required></textarea>
                </div>

                <p class="error-msg" id="error-msg">전송에 실패했습니다. 잠시 후 다시 시도해주세요.</p>
                <button type="submit" id="submit-btn">✉️ 문의 보내기</button>
            </form>
        </div>

        <!-- Success view -->
        <div id="success-view" class="result-msg">
            <div class="icon">🎉</div>
            <h2>문의가 접수되었습니다!</h2>
            <p>빠른 시일 내에 담당자가 연락드리겠습니다.<br>감사합니다 🙏</p>
            <a href="index.html" class="home-link">홈으로 돌아가기</a>
        </div>
    </div>

    <script>
        // Theme toggle (same logic as main page)
        const themeToggle = document.getElementById('theme-toggle');
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark');
            themeToggle.textContent = '☀️';
        }
        themeToggle.addEventListener('click', () => {
            const isDark = document.body.classList.toggle('dark');
            themeToggle.textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        // Form submission via fetch (no redirect)
        const form = document.getElementById('contact-form');
        const submitBtn = document.getElementById('submit-btn');
        const errorMsg = document.getElementById('error-msg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.textContent = '전송 중...';
            errorMsg.classList.remove('show');

            try {
                const res = await fetch(form.action, {
                    method: 'POST',
                    body: new FormData(form),
                    headers: { 'Accept': 'application/json' }
                });

                if (res.ok) {
                    document.getElementById('form-view').style.display = 'none';
                    document.getElementById('success-view').classList.add('show');
                } else {
                    throw new Error();
                }
            } catch {
                errorMsg.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.textContent = '✉️ 문의 보내기';
            }
        });
    </script>
</body>
</html>
